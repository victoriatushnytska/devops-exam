name: "Task 2: Ansible CI/CD"

on:
  push:
    branches:
      - main
    paths:
      - 'task2/**'
  workflow_dispatch:

jobs:
  ansible:
    name: "Run Ansible Playbook"
    runs-on: ubuntu-latest
    env:
      ANSIBLE_HOST_KEY_CHECKING: False

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/exam_key
          chmod 600 ~/.ssh/exam_key

      - name: Ansible Dry Run (Перевірка правильності)
        env:
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
        run: |
          ansible-playbook -i task2/inventory.ini task2/playbook.yml --check

      - name: Run Ansible Playbook (Реальне встановлення)
        env:
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
        run: |
          ansible-playbook -i task2/inventory.ini task2/playbook.yml

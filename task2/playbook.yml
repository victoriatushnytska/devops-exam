---
- name: Setup Kubernetes (Minikube) and Helm
  hosts: nodes
  become: yes
  tasks:
    - name: Update apt cache and install basic dependencies
      apt:
        name:
          - curl
          - wget
          - apt-transport-https
          - ca-certificates
          - software-properties-common
          - conntrack
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Download Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Download kubectl
      get_url:
        url: "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Helm (Shell version)
      shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Start Minikube
      command: minikube start --driver=docker --force
      ignore_errors: yes

    - name: Enable Minikube Dashboard
      command: minikube dashboard --url
      async: 2592000
      poll: 0

    - name: Run kubectl proxy
      shell: nohup kubectl proxy --address="0.0.0.0" --port=8001 --accept-hosts='^.*' </dev/null >/dev/null 2>&1 &
      async: 2592000
      poll: 0
